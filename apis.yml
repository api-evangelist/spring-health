aid: spring-health
name: Spring Health
description: >-
  Spring Health is a New York City-based digital mental health company that
  sells a comprehensive mental healthcare benefit to employers, health plans,
  brokers, channel partners, and healthcare providers. Its platform combines
  a clinically validated assessment, AI-driven matching, and a curated
  provider network to deliver therapy, medication management, coaching, an
  Employee Assistance Program (EAP), critical-incident response, work-life
  services, and self-guided digital exercises through a unified member
  experience branded Spring Life. For health plans and providers, Spring
  Health offers Springworks — its enterprise care-coordination and
  care-management offering — alongside a generative-AI member-facing
  assistant called Guide and clinician-facing AI tooling. Customers include
  General Mills, Hearst, and Moda Health, and the company publishes
  outcomes, research, and ROI evidence on long-term cost savings of mental
  health benefits. Spring Health operates as a B2B2C benefit: it does not
  expose a public developer portal, OpenAPI specification, SDK, or
  documented HTTP API. Integrations with HRIS, SSO, eligibility files, and
  health-plan partners are delivered through enterprise implementation
  rather than a self-service API, and its GitHub organization
  (github.com/SpringHealth) has no public repositories.
